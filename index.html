.heatmap-cell {

code { font-family: ui-monospace, monospace; }

function formatUsdFromMillions(value) {
  if (value >= 1_000_000) {
    const trillions = value / 1_000_000;
    return `$${Number(trillions.toPrecision(3)).toString()}T`;
  }
  if (value >= 1_000) {
    const billions = value / 1_000;
    return `$${Number(billions.toPrecision(3)).toString()}B`;
  }
  return `$${Number(value.toPrecision(3)).toString()}M`;
}

function formatUsdDeltaFromMillions(value) {
  return `${value < 0 ? "-" : ""}${formatUsdFromMillions(Math.abs(value))}`;
}

function formatUsdBillionsFromMillionsDelta(value) {
  const billions = value / 1_000;
  const rounded = Number(billions.toPrecision(3)).toString();
  return `${value < 0 ? "-" : ""}$${Math.abs(Number(rounded)).toString()}B`;
}

function sparkSvg(values, width = 120, height = 32) {
  const max = Math.max(...values);
  const ys = values.map(v => {
    if (max === 0) return height - 4;
    return height - 4 - (v / max) * (height - 8);
  });
  const step = (width - 8) / (values.length - 1);
  const xs = values.map((_, i) => 4 + i * step);
  const points = xs.map((x, i) => `${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const circles = xs.map((x, i) =>
    `<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="2.5" />`
  ).join("");
  return `<svg viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" aria-hidden="true"><polyline points="${points}" />${circles}</svg>`;
}

function hslString(h, s, l) {
  return `hsl(${h} ${s}% ${l}%)`;
}

function hslToRgb(h, s, l) {
  const sat = s / 100;
  const light = l / 100;
  const c = (1 - Math.abs(2 * light - 1)) * sat;
  const hp = h / 60;
  const x = c * (1 - Math.abs((hp % 2) - 1));
  let [r1, g1, b1] = [0, 0, 0];

  if (hp >= 0 && hp < 1) [r1, g1, b1] = [c, x, 0];
  else if (hp < 2) [r1, g1, b1] = [x, c, 0];
  else if (hp < 3) [r1, g1, b1] = [0, c, x];
  else if (hp < 4) [r1, g1, b1] = [0, x, c];
  else if (hp < 5) [r1, g1, b1] = [x, 0, c];
  else [r1, g1, b1] = [c, 0, x];

  const m = light - c / 2;
  return {
    r: Math.round((r1 + m) * 255),
    g: Math.round((g1 + m) * 255),
    b: Math.round((b1 + m) * 255)
  };
}

function relativeLuminance({ r, g, b }) {
  const toLinear = channel => {
    const normalized = channel / 255;
    return normalized <= 0.03928
      ? normalized / 12.92
      : ((normalized + 0.055) / 1.055) ** 2.4;
  };
  return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
}

function contrastRatio(a, b) {
  const lighter = Math.max(relativeLuminance(a), relativeLuminance(b));
  const darker = Math.min(relativeLuminance(a), relativeLuminance(b));
  return (lighter + 0.05) / (darker + 0.05);
}

function readableTextColor(h, s, l) {
  const background = hslToRgb(h, s, l);
  const darkText = { r: 15, g: 23, b: 42 };
  const lightText = { r: 248, g: 250, b: 252 };
  return contrastRatio(background, darkText) >= contrastRatio(background, lightText)
    ? "rgb(15 23 42)"
    : "rgb(248 250 252)";
}

function titleCaseToken(value) {

function formatCostSeries(values, labels) {

function formatCapacityShortLabel(value) {

  }
  return String(numeric);
}

function heatmapRowLabel(dataset) {

function datasetsForCountry(countryCode) {
  return datasets
    .filter(dataset => dataset.country_code === countryCode)
    .sort((a, b) =>
      (behaviourOrder[a.behaviour] ?? 99) - (behaviourOrder[b.behaviour] ?? 99)
      || Number(a.hospital_capacity) - Number(b.hospital_capacity)
    );
}

function responseChoices(rows) {
  const seen = new Set();
  return rows.filter(row => {
    if (seen.has(row.response_id)) {
      return false;
    }
    seen.add(row.response_id);
    return true;
  }).map(row => ({ value: row.response_id, label: row.response_label }));
}

function capacityEffect(values) {
  if (values.length < 2) {
    return 0;
  }
  const xs = values.map((_, index) => index);
  const ys = values.map(value => Math.log(value));
  const xMean = xs.reduce((sum, value) => sum + value, 0) / xs.length;
  const yMean = ys.reduce((sum, value) => sum + value, 0) / ys.length;
  const numerator = xs.reduce((sum, value, index) => (
    sum + (value - xMean) * (ys[index] - yMean)
  ), 0);
  const denominator = xs.reduce((sum, value) => sum + (value - xMean) ** 2, 0);
  if (denominator === 0) {
    return 0;
  }
  return -(numerator / denominator);
}

function buildCapacityRows(countryCode, responseId, vaccineLevel) {
  const seriesDatasets = datasetsForCountry(countryCode);
  if (!seriesDatasets.length) {
    return [];
  }
  const vaccineIndex = vaccineLevelIndex[vaccineLevel];
  const datasetRowsByKey = seriesDatasets.map(dataset => ({
    dataset,
    rowsByKey: new Map(
      dataset.rows
        .filter(row => row.response_id === responseId)
        .map(row => [`${row.response_id}::${row.pathogen_label}`, row])
    )
  }));
  return seriesDatasets[0].rows
    .filter(row => row.response_id === responseId)
    .map(baseRow => {
      const key = `${baseRow.response_id}::${baseRow.pathogen_label}`;
      const matchedRows = datasetRowsByKey.map(({ dataset, rowsByKey }) => {
        const row = rowsByKey.get(key);
        if (!row) {
          throw new Error(`Missing hospital-capacity comparison row for ${key} in ${dataset.id}`);
        }
        return { dataset, row };
      });
      const costs = matchedRows.map(({ row }) => row.costs[vaccineIndex]);
      return {
        pathogen_label: baseRow.pathogen_label,
        metric: capacityEffect(costs),
        costs,
        labels: matchedRows.map(({ dataset }) => (
          `${titleCaseToken(dataset.behaviour)} (${dataset.hospital_capacity})`
        ))
      };
    });
}

function buildHeatmapRows(countryCode, responseId) {
  const seriesDatasets = datasetsForCountry(countryCode);
  if (!seriesDatasets.length) {
    return [];
  }
  const datasetRowsByKey = seriesDatasets.map(dataset => ({
    dataset,
    rowsByKey: new Map(
      dataset.rows
        .filter(row => row.response_id === responseId)
        .map(row => [`${row.response_id}::${row.pathogen_label}`, row])
    )
  }));
  return seriesDatasets[0].rows
    .filter(row => row.response_id === responseId)
    .map(baseRow => {
      const key = `${baseRow.response_id}::${baseRow.pathogen_label}`;
      const matrixRows = datasetRowsByKey.map(({ dataset, rowsByKey }) => {
        const row = rowsByKey.get(key);
        if (!row) {
          throw new Error(`Missing heatmap row for ${key} in ${dataset.id}`);
        }
        return {
          label: `${titleCaseToken(dataset.behaviour)} (${dataset.hospital_capacity})`,
          shortLabel: heatmapRowLabel(dataset),
          values: row.costs
        };
      });
      const baselineCost = matrixRows[0].values[0];
      const matrixRowsWithReductions = matrixRows.map(matrixRow => ({
        ...matrixRow,
        reductions: matrixRow.values.map(value => baselineCost - value)
      }));
      const startCost = baselineCost;
      const endCost = matrixRows[matrixRows.length - 1].values[vaccineLevels.length - 1];
      return {
        pathogen_label: baseRow.pathogen_label,
        metric: Math.log(startCost / endCost),
        reduction: startCost - endCost,
        baselineCost,
        matrixRows: matrixRowsWithReductions
      };
    });
}

function heatmapScale(values) {
  return {
    min: Math.min(...values),
    max: Math.max(...values)
  };
}

function reductionValuesForCountry(countryCode) {
  const countryDatasets = datasetsForCountry(countryCode);
  const responses = responseChoices(countryDatasets[0]?.rows ?? []);
  return [
    ...countryDatasets.flatMap(dataset =>
      dataset.rows.map(row => row.costs[0] - row.costs[row.costs.length - 1])
    ),
    ...responses.flatMap(response =>
      vaccineLevels.flatMap(vaccineLevel =>
        buildCapacityRows(countryCode, response.value, vaccineLevel)
          .map(row => row.costs[0] - row.costs[row.costs.length - 1])
      )
    ),
    ...responses.flatMap(response =>
      buildHeatmapRows(countryCode, response.value).map(row => row.reduction)
    )
  ];
}

function heatmapReductionScaleForCountry(countryCode) {
  const responses = responseChoices(datasetsForCountry(countryCode)[0]?.rows ?? []);
  const reductions = responses.flatMap(response =>
    buildHeatmapRows(countryCode, response.value)
      .flatMap(row => row.matrixRows)
      .flatMap(matrixRow => matrixRow.reductions)
  );
  return heatmapScale(reductions.length ? reductions : [0]);
}

const maxAbsCapacityEffect = Math.max(
  1e-12,
  ...Array.from(countryNames.keys()).flatMap(countryCode =>
    vaccineLevels.flatMap(vaccineLevel =>
      responseChoices(datasetsForCountry(countryCode)[0]?.rows ?? []).flatMap(response =>
        buildCapacityRows(countryCode, response.value, vaccineLevel).map(row => Math.abs(row.metric))
      )
    )
  )
);

function vaccineTrendPalette(logSlope) {
  const stepChange = Math.abs(Math.exp(logSlope) - 1);
  const magnitude = Math.min(Math.abs(logSlope) / maxAbsSlope, 1);
  const darkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;
  if (stepChange < ambiguousStepChangeThreshold) {
    const h = 220;
    const s = 8 + magnitude * 10;
    const l = darkMode ? 30 + magnitude * 6 : 88 - magnitude * 8;
    return {
      spark: hslString(h, 10 + magnitude * 8, darkMode ? 74 - magnitude * 8 : 42 - magnitude * 4),
      bg: hslString(h, s, l),
      border: hslString(h, 10 + magnitude * 10, darkMode ? 52 : 62 - magnitude * 6),
      fg: readableTextColor(h, s, l)
    };
  }
  const good = logSlope < 0;
  const hue = good ? 148 : 10;
  const sparkSaturation = 48 + magnitude * 34;
  const sparkLightness = darkMode ? 74 - magnitude * 18 : 44 - magnitude * 8;
  const badgeSaturation = 32 + magnitude * 42;
  const badgeLightness = darkMode ? 29 + magnitude * 10 : 92 - magnitude * 18;

  return {
    spark: hslString(hue, sparkSaturation, sparkLightness),
    bg: hslString(hue, badgeSaturation, badgeLightness),
    border: hslString(hue, 42 + magnitude * 24, darkMode ? 52 : 62 - magnitude * 12),
    fg: readableTextColor(hue, badgeSaturation, badgeLightness)
  };
}

function capacityTrendPalette(capacityEffect) {
  const magnitude = Math.min(Math.abs(capacityEffect) / maxAbsCapacityEffect, 1);
  const darkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;
  const good = capacityEffect > 0;
  const hue = good ? 148 : 10;
  const sparkSaturation = good
    ? 44 + magnitude * 34
    : 10 + magnitude * 56;
  const sparkLightness = good
    ? (darkMode ? 74 - magnitude * 18 : 44 - magnitude * 8)
    : (darkMode ? 74 - magnitude * 18 : 52 - magnitude * 12);
  const badgeSaturation = good
    ? 28 + magnitude * 46
    : 8 + magnitude * 58;
  const badgeLightness = good
    ? (darkMode ? 29 + magnitude * 10 : 92 - magnitude * 18)
    : (darkMode ? 31 + magnitude * 8 : 92 - magnitude * 22);

  return {
    spark: hslString(hue, sparkSaturation, sparkLightness),
    bg: hslString(hue, badgeSaturation, badgeLightness),
    border: hslString(hue, 18 + magnitude * 48, darkMode ? 52 : 64 - magnitude * 16),
    fg: readableTextColor(hue, badgeSaturation, badgeLightness)
  };
}

function reductionPalette(reduction, maxAbsReduction) {
  const magnitude = maxAbsReduction > 0
    ? Math.min(Math.abs(reduction) / maxAbsReduction, 1)
    : 0;
  const darkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;
  if (Math.abs(reduction) < 1e-12 || magnitude < 0.02) {
    const h = 215;
    const s = 8 + magnitude * 10;
    const l = darkMode ? 30 + magnitude * 6 : 88 - magnitude * 8;
    return {
      bg: hslString(h, s, l),
      border: hslString(h, 10 + magnitude * 10, darkMode ? 52 : 62 - magnitude * 6),
      fg: readableTextColor(h, s, l)
    };
  }
  const positive = reduction > 0;
  const hue = positive ? 148 : 10;
  const saturation = positive
    ? 28 + magnitude * 46
    : 10 + magnitude * 58;
  const lightness = positive
    ? (darkMode ? 29 + magnitude * 10 : 92 - magnitude * 18)
    : (darkMode ? 31 + magnitude * 8 : 92 - magnitude * 22);
  return {
    bg: hslString(hue, saturation, lightness),
    border: hslString(hue, 18 + magnitude * 48, darkMode ? 52 : 64 - magnitude * 16),
    fg: readableTextColor(hue, saturation, lightness)
  };
}

function heatmapNeutralPalette() {
  const darkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;
  return {
    bg: hslString(210, darkMode ? 10 : 12, darkMode ? 28 : 95),
    border: hslString(210, darkMode ? 12 : 14, darkMode ? 42 : 78)
  };
}

function heatmapCellPalette(reduction, min, max) {
  const darkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;
  if (!(max > min) || Math.abs(reduction) < 1e-12) {
    return heatmapNeutralPalette();
  }
  if (reduction > 0) {
    const t = Math.max(0, Math.min(max > 0 ? reduction / max : 0, 1));
    return {
      bg: hslString(52, darkMode ? 22 + t * 64 : 24 + t * 58, darkMode ? 32 + t * 28 : 95 - t * 36),
      border: hslString(52, darkMode ? 18 + t * 34 : 20 + t * 28, darkMode ? 46 + t * 14 : 76 - t * 16)
    };
  }
  const t = Math.max(0, Math.min(min < 0 ? reduction / min : 0, 1));
  return {
    bg: hslString(220, darkMode ? 24 + t * 58 : 28 + t * 48, darkMode ? 30 + t * 24 : 95 - t * 42),
    border: hslString(220, darkMode ? 18 + t * 34 : 20 + t * 28, darkMode ? 46 + t * 16 : 76 - t * 20)
  };
}

function heatmapGrid(row, scale) {
  const header = vaccineLevels.map(level => `
    <div class="heatmap-axis heatmap-axis-x" title="${titleCaseToken(level)}">${vaccineLevelShortLabel[level]}</div>
  `).join("");
  const body = [...row.matrixRows].reverse().map(matrixRow => `
    <div class="heatmap-axis heatmap-axis-y" title="${matrixRow.label}">${matrixRow.shortLabel}</div>
    ${matrixRow.values.map((value, index) => {
      const reduction = matrixRow.reductions[index];
      const palette = heatmapCellPalette(reduction, scale.min, scale.max);
      return `
        <div
          class="heatmap-cell"
          style="background: ${palette.bg}; border-color: ${palette.border};"
          title="${matrixRow.label} \u2022 ${titleCaseToken(vaccineLevels[index])}: ${formatUsdFromMillions(value)} (${formatUsdDeltaFromMillions(reduction)} vs baseline)"
        ></div>
      `;
    }).join("")}
  `).join("");
  return `
    <div class="heatmap-wrap">
      <div class="heatmap-grid">
        <div></div>
        ${header}
        ${body}
      </div>
    </div>
  `;
}

function renderHeatmapLegend(scale) {
  const low = heatmapCellPalette(scale.min, scale.min, scale.max);
  const mid = heatmapNeutralPalette();
  const high = heatmapCellPalette(scale.max, scale.min, scale.max);
  const zeroStop = scale.max > scale.min
    ? Math.max(0, Math.min((-scale.min / (scale.max - scale.min)) * 100, 100))
    : 50;
  heatmapLegend.hidden = false;
  heatmapLegend.innerHTML = `
    <span>Heatmap colors show cost reduction versus the lowest-capacity, no-vaccine baseline.</span>
    <span>${formatUsdDeltaFromMillions(scale.min)}</span>
    <span
      class="heatmap-legend-bar"
      style="background: linear-gradient(90deg, ${low.bg} 0%, ${mid.bg} ${zeroStop.toFixed(1)}%, ${high.bg} 100%); border: 1px solid ${high.border};"
      aria-hidden="true"
    ></span>
    <span>${formatUsdDeltaFromMillions(scale.max)}</span>
    <span>Blue = higher cost than baseline; neutral = baseline; yellow = lower cost than baseline. Colors are comparable across the selected country.</span>
  `;
}

const viewModeOptions = [
  { value: "vaccine", label: "Vaccine preparedness" },
  { value: "capacity", label: "Hospital capacity" },
  { value: "heatmap", label: "Heatmap" }
];

function setOptions(select, options, selectedValue) {
  if (!options.length) {
    select.innerHTML = "";
    select.value = "";
    select.disabled = true;
    return;
  }
  select.disabled = false;
  select.innerHTML = options.map(option => `
    <option value="${option.value}">${option.label}</option>
  `).join("");
  select.value = options.some(option => option.value === selectedValue)
    ? selectedValue
    : options[0].value;
}

function populateCountryOptions(selectedCountry) {
  const options = Array.from(countryNames, ([value, label]) => ({ value, label }));
  setOptions(countrySelect, options, selectedCountry);
}

function availableViewOptions(countryCode) {
  return viewModeOptions.filter(option => (
    option.value !== "heatmap" || datasetsForCountry(countryCode).length >= 2
  ));
}

function populateViewOptions(countryCode, selectedViewMode) {
  setOptions(viewSelect, availableViewOptions(countryCode), selectedViewMode);
}

function populateCapacityOptions(countryCode, selectedDatasetId) {
  const options = datasetsForCountry(countryCode).map(dataset => ({
    value: dataset.id,
    label: `${titleCaseToken(dataset.behaviour)} (${dataset.hospital_capacity})`
  }));
  setOptions(capacitySelect, options, selectedDatasetId);
}

function activeViewMode() {
  return viewSelect.value;
}

function selectedDataset() {
  return datasetsById.get(capacitySelect.value);
}

function responseSourceRows() {
  if (activeViewMode() !== "vaccine") {
    return datasetsForCountry(countrySelect.value)[0]?.rows ?? [];
  }
  return selectedDataset()?.rows ?? [];
}

function populateResponseOptions(rows, selectedResponseId) {
  setOptions(responseSelect, responseChoices(rows), selectedResponseId);
}

function render() {
  const viewMode = activeViewMode();
  const countryDatasets = datasetsForCountry(countrySelect.value);
  const dataset = viewMode === "vaccine"
    ? selectedDataset()
    : countryDatasets[0];
  const tbody = document.getElementById("rows");
  if (!countryDatasets.length || !dataset || !responseSelect.value) {
    tbody.innerHTML = "";
    document.getElementById("title-country").textContent = "No data";
    document.getElementById("title-mode").textContent = "vaccine sweep";
    document.getElementById("cost-heading").textContent = "Total cost across vaccine levels";
    document.getElementById("metric-heading").textContent = "Log-slope";
    capacityControl.hidden = false;
    capacityControl.style.display = activeViewMode() === "vaccine" ? "inline-flex" : "none";
    vaccineControl.hidden = true;
    vaccineControl.style.display = "none";
    heatmapLegend.hidden = true;
    heatmapLegend.innerHTML = "";
    metaSummary.textContent = "No embedded datasets available.";
    metaDetails.innerHTML = dataSourceMeta.detailsHtml;
    document.title = "Vietnam vaccine sweep";
    return;
  }
  const rows = viewMode === "capacity"
    ? buildCapacityRows(countrySelect.value, responseSelect.value, vaccineSelect.value)
    : viewMode === "heatmap"
      ? buildHeatmapRows(countrySelect.value, responseSelect.value)
      : dataset.rows.filter(row => row.response_id === responseSelect.value);
  const heatmapScale = viewMode === "heatmap"
    ? heatmapReductionScaleForCountry(countrySelect.value)
    : null;
  const reductionValues = reductionValuesForCountry(countrySelect.value);
  const maxAbsReduction = Math.max(1e-12, ...reductionValues.map(value => Math.abs(value)));
  const responseLabel = responseSelect.selectedOptions[0]?.text.toLowerCase() ?? "response";
  const vaccineLabel = vaccineSelect.selectedOptions[0]?.text.toLowerCase() ?? vaccineSelect.value;
  tbody.innerHTML = rows.map(row => {
    if (viewMode === "heatmap") {
      const reductionPaletteValue = reductionPalette(row.reduction, maxAbsReduction);
      return `
        <tr>
          <td>${row.pathogen_label}</td>
          <td>${heatmapGrid(row, heatmapScale)}</td>
          <td class="num" title="Lowest hospital capacity with no vaccine \u2192 highest hospital capacity with high vaccine">${formatLogSlope(row.metric)}</td>
          <td class="num trend-cell">
            <span
              class="trend-badge"
              style="--trend-bg: ${reductionPaletteValue.bg}; --trend-border: ${reductionPaletteValue.border}; --trend-fg: ${reductionPaletteValue.fg};"
              title="${formatUsdDeltaFromMillions(row.reduction)}"
            >
              <span>${formatUsdBillionsFromMillionsDelta(row.reduction)}</span>
            </span>
          </td>
        </tr>
      `;
    }
    const metric = viewMode === "capacity" ? row.metric : row.log_slope;
    const palette = viewMode === "capacity"
      ? capacityTrendPalette(metric)
      : vaccineTrendPalette(metric);
    const slope = formatLogSlope(metric);
    const reduction = row.costs[0] - row.costs[row.costs.length - 1];
    const reductionPaletteValue = reductionPalette(reduction, maxAbsReduction);
    const nums = viewMode === "capacity"
      ? formatCostSeries(row.costs, row.labels)
      : row.costs.map(formatUsdFromMillions).join(" ");
    return `
      <tr>
        <td>${row.pathogen_label}</td>
        <td class="spark" style="--trend-color: ${palette.spark};">
          ${sparkSvg(row.costs)}
          <div class="nums">${nums}</div>
        </td>
        <td class="num trend-cell">
          <span
            class="trend-badge"
            style="--trend-bg: ${palette.bg}; --trend-border: ${palette.border}; --trend-fg: ${palette.fg};"
            title="${slope}"
          >
            <span>${slope}</span>
          </span>
        </td>
        <td class="num trend-cell">
          <span
            class="trend-badge"
            style="--trend-bg: ${reductionPaletteValue.bg}; --trend-border: ${reductionPaletteValue.border}; --trend-fg: ${reductionPaletteValue.fg};"
            title="${formatUsdDeltaFromMillions(reduction)}"
          >
            <span>${formatUsdBillionsFromMillionsDelta(reduction)}</span>
          </span>
        </td>
      </tr>
    `;
  }).join("");
  document.getElementById("title-country").textContent = dataset.country_label;
  document.getElementById("title-mode").textContent = viewMode === "capacity"
    ? "hospital capacity sweep"
    : viewMode === "heatmap"
      ? "cost heatmaps"
      : "vaccine sweep";
  document.getElementById("cost-heading").textContent = viewMode === "capacity"
    ? "Total cost across hospital-capacity tiers"
    : viewMode === "heatmap"
      ? "Total cost heatmap"
      : "Total cost across vaccine levels";
  document.getElementById("metric-heading").textContent = viewMode === "capacity"
    ? "Capacity effect"
    : viewMode === "heatmap"
      ? "Endpoint log change"
      : "Log-slope";
  const showCapacityControl = viewMode === "vaccine";
  const showVaccineControl = viewMode === "capacity";
  capacityControl.hidden = !showCapacityControl;
  capacityControl.style.display = showCapacityControl ? "inline-flex" : "none";
  vaccineControl.hidden = !showVaccineControl;
  vaccineControl.style.display = showVaccineControl ? "inline-flex" : "none";
  if (viewMode === "heatmap") {
    renderHeatmapLegend(heatmapScale);
  } else {
    heatmapLegend.hidden = true;
    heatmapLegend.innerHTML = "";
  }
  metaSummary.innerHTML = viewMode === "capacity"
    ? `Hospital capacity order = ${countryDatasets.map(dataset => `<code>${titleCaseToken(dataset.behaviour)} (${dataset.hospital_capacity})</code>`).join(" \u2192 ")}, holding vaccine parameter = <code>${vaccineLabel}</code> fixed. Positive capacity-effect values mean total costs trend downward as hospital capacity increases; zero or negative values are bad.`
    : viewMode === "heatmap"
      ? `Rows run top to bottom as hospital capacity tiers ${[...countryDatasets].reverse().map(dataset => `<code>${titleCaseToken(dataset.behaviour)} (${dataset.hospital_capacity})</code>`).join(" \u2192 ")}, columns = <code>none \u2192 low \u2192 medium \u2192 high</code>. Cells still show total cost, but colors show cost reduction versus the lowest-capacity/no-vaccine baseline cell for that disease and response. Blue means higher cost than baseline, yellow means lower cost than baseline, and the color scale is normalized across the selected country. Endpoint log change and cost reduction compare the lowest-capacity/no-vaccine cell with the highest-capacity/high-vaccine cell.`
      : `Hospital capacity = <code>${dataset.behaviour}</code> (<code>${dataset.hospital_capacity}</code>), vaccine order = <code>none \u2192 low \u2192 medium \u2192 high</code>. Total costs shown as USD totals with <code>M/B/T</code> suffixes to 3 significant figures, using the rounded values from the selected CSV. Negative log-slopes shade toward green, positive slopes toward red, and near-flat slopes stay neutral.`;
  metaDetails.innerHTML = dataSourceMeta.detailsHtml;
  document.title = viewMode === "capacity"
    ? `${dataset.country_label} ${responseLabel} hospital capacity sweep`
    : viewMode === "heatmap"
      ? `${dataset.country_label} ${responseLabel} cost heatmaps`
      : `${dataset.country_label} ${responseLabel} vaccine sweep`;
}

const viewSelect = document.getElementById("view-select");
const countrySelect = document.getElementById("country-select");
const capacityControl = document.getElementById("capacity-control");
const vaccineControl = document.getElementById("vaccine-control");
const capacitySelect = document.getElementById("capacity-select");
const vaccineSelect = document.getElementById("vaccine-select");
const responseSelect = document.getElementById("response-select");
const heatmapLegend = document.getElementById("heatmap-legend");
const metaSummary = document.getElementById("meta-summary");
const metaDetails = document.getElementById("meta-details");

countrySelect.addEventListener("change", event => {
  populateViewOptions(event.target.value, viewSelect.value);
  populateCapacityOptions(event.target.value, capacitySelect.value);
  populateResponseOptions(responseSourceRows(), responseSelect.value);
  render();
});

capacitySelect.addEventListener("change", () => {
  populateResponseOptions(responseSourceRows(), responseSelect.value);
  render();
});

viewSelect.addEventListener("change", () => {
  populateResponseOptions(responseSourceRows(), responseSelect.value);
  render();
});

vaccineSelect.addEventListener("change", render);

responseSelect.addEventListener("change", render);

const initialCountryCode = Array.from(countryNames.keys())[0];
populateCountryOptions(initialCountryCode);
populateViewOptions(countrySelect.value, "vaccine");
populateCapacityOptions(countrySelect.value, datasetsForCountry(countrySelect.value)[0]?.id);
populateResponseOptions(responseSourceRows(), responseChoices(responseSourceRows())[0]?.value);
render();
</script>
</body>
</html>
